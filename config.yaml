manager: 127.0.0.1:6620
tcp: 0.0.0.0:1248
kcp: 0.0.0.0:1248
websocket: 0.0.0.0:1249
scp:
  handshake_timeout: 30
  reuse_time: 30
  reuse_buffer: 65536
tcp_option:
  read_timeout: 0
  keepalive: true
  keepalive_interval: 60
websocket_option:
  read_timeout: 0
  keepalive: true
  keepalive_interval: 60
  # 置于 Nginx 等反向代理之后时，从指定 HTTP 头解析真实客户端 IP（如 X-Forwarded-For / X-Real-IP）
  # 为空表示不信任代理头，直接使用 TCP 连接地址。仅在确信请求经由可信代理时才开启，避免被伪造。
  real_ip_header: ""
kcp_option:
  read_timeout: 60
  fec_data_shards: 0
  fec_parity_shards: 0
  read_buffer: 4194304
  write_buffer: 4194304
  opt_mtu: 1400
  opt_nodelay: 1
  opt_interval: 10 # ms
  opt_resend: 2
  opt_nc: 1
  opt_sndwnd: 2048
  opt_rcvwnd: 2048
  opt_stream: true
upstream_option:
  net: tcp
#  resolv:
#    port: 443
#    suffix: .com
#    prefix: mail.
#    pattern : google
hosts:
  - name: test1
    addr: 127.0.0.1:11248
    weight: 100
  - name: test2
    addr: 127.0.0.1:11249
    weight: 100
